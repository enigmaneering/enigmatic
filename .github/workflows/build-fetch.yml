name: Build e

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.1)'
        required: true
        type: string

jobs:
  build-e:
    name: Build e CLI
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14
            platform: darwin-arm64
            goos: darwin
            goarch: arm64
          - os: macos-latest
            runner: macos-14
            platform: darwin-amd64
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
            goos: linux
            goarch: arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            goos: windows
            goarch: amd64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            goos: windows
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Build e (Unix)
        if: runner.os != 'Windows'
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o e-${{ matrix.platform }}

      - name: Build e (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:GOOS="${{ matrix.goos }}"
          $env:GOARCH="${{ matrix.goarch }}"
          go build -o e-${{ matrix.platform }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: e-${{ matrix.platform }}
          path: |
            e-${{ matrix.platform }}
            e-${{ matrix.platform }}.exe

  create-release:
    name: Create e Release
    needs: [build-e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ inputs.version }}"
          git tag $TAG
          git push origin $TAG

      - name: Download e artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'e-*'

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Create e Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/e-*
          body: |
            # e ${{ inputs.version }}

            CLI tool and Go module that downloads and extracts the enigmaneering redistributable binaries.

            By default, fetches the latest redistributables. View [all redistributable releases](https://git.enigmaneering.org/redistributables/releases?q=redistributables) to see available versions.

            ## 🚀 Quick Start

            ### Using the fetch CLI

            Run the `fetch` binary to download the shader toolchain binaries:

            ```bash
            # macOS ARM64 (Apple Silicon)
            curl -L -o e https://git.enigmaneering.org/enigmatic/releases/download/${{ inputs.version }}/e-darwin-arm64
            chmod +x e
            ./e fetch

            # macOS x86_64 (Intel)
            curl -L -o e https://git.enigmaneering.org/enigmatic/releases/download/${{ inputs.version }}/e-darwin-amd64
            chmod +x e
            ./e fetch

            # Linux x86_64
            curl -L -o e https://git.enigmaneering.org/enigmatic/releases/download/${{ inputs.version }}/e-linux-amd64
            chmod +x e
            ./e fetch

            # Linux ARM64
            curl -L -o e https://git.enigmaneering.org/enigmatic/releases/download/${{ inputs.version }}/e-linux-arm64
            chmod +x e
            ./e fetch

            # Windows x86_64 (PowerShell)
            Invoke-WebRequest -Uri "https://git.enigmaneering.org/enigmatic/releases/download/${{ inputs.version }}/e-windows-amd64.exe" -OutFile "e.exe"
            .\e.exe fetch

            # Windows ARM64 (PowerShell)
            Invoke-WebRequest -Uri "https://git.enigmaneering.org/enigmatic/releases/download/${{ inputs.version }}/e-windows-arm64.exe" -OutFile "e.exe"
            .\e.exe fetch
            ```

            ### Using the Go Module

            ```go
            import "git.enigmaneering.org/enigmatic/gpu"

            func main() {
                // Downloads and extracts latest toolchain to ./external/
                if err := gpu.EnsureLibraries(); err != nil {
                    log.Fatal(err)
                }

                // Specify a version and custom directory
                os.Setenv("ENIGMATIC_GOFETCH_DIRECTORY", "./my-shaders")
                if err := gpu.EnsureLibrariesVersion("v0.0.45"); err != nil {
                    log.Fatal(err)
                }
            }
            ```

            Install:
            ```bash
            go get git.enigmaneering.org/enigmatic@${{ inputs.version }}
            ```

            ## 📦 Downloads

            Fetches the latest redistributables containing:

            - **glslang** - GLSL/ESSL → SPIRV compiler
            - **SPIRV-Cross** - SPIRV → GLSL/HLSL/MSL/WGSL transpiler
            - **DXC** - HLSL → SPIRV/DXIL compiler
            - **Naga** - WGSL/GLSL/SPIRV multi-format compiler

            ## 💻 Platforms

            - macOS ARM64, x86_64
            - Linux ARM64, x86_64
            - Windows ARM64, x86_64

            ## 🔄 Features

            - Automatic version detection and upgrades
            - Create `FREEZE` file to pin version
            - Version tracking via `.version` file
            - Custom directory via `ENIGMATIC_GOFETCH_DIRECTORY`

            ## 📝 CLI Usage

            ```bash
            fetch                     # Download latest
            fetch --version v0.0.45   # Download specific version
            fetch --dir ./shaders     # Custom output directory
            fetch --help              # Show help
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
